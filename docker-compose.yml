x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    logging: *default-logging
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dau-network

  backend-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    logging: *default-logging
    env_file:
      - .env
      - .env.docker
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./passport_analysis_agent:/app/passport_analysis_agent
      - ./financial_document_agent:/app/financial_document_agent
      - ./education_credential_agent:/app/education_credential_agent
      - ./master_orchestrator_agent:/app/master_orchestrator_agent
      - ./document_analysis_ui/backend:/app/document_analysis_ui/backend
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 2>&1 | tee /app/logs/backend-api.log"
    networks:
      - dau-network

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    logging: *default-logging
    command: >
      sh -c "celery -A app.celery_app worker --loglevel=info --concurrency=2 2>&1 | tee /app/logs/celery-worker.log"
    env_file:
      - .env
      - .env.docker
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./passport_analysis_agent:/app/passport_analysis_agent
      - ./financial_document_agent:/app/financial_document_agent
      - ./education_credential_agent:/app/education_credential_agent
      - ./master_orchestrator_agent:/app/master_orchestrator_agent
      - ./document_analysis_ui/backend:/app/document_analysis_ui/backend
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dau-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./logs:/var/log/nginx
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-api
    networks:
      - dau-network

networks:
  dau-network:
    driver: bridge
